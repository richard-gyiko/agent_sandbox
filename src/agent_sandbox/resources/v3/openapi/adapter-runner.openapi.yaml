openapi: 3.1.0
info:
  title: Agent Sandbox Adapter Runner Contract
  version: 1.0.0
  description: |
    Contract for external workflow/agent adapters that integrate with Agent Sandbox.
    The adapter accepts a `lab.adapter.v1` input payload and returns a
    `lab.adapter.v1` output payload.
servers:
  - url: http://localhost:9000
paths:
  /v1/adapter/run:
    post:
      operationId: runAdapter
      summary: Execute adapter run request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdapterInput'
      responses:
        '200':
          description: Adapter execution output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterOutput'
        '400':
          description: Invalid adapter request payload
        '500':
          description: Adapter execution error
components:
  schemas:
    AdapterInput:
      type: object
      required: [schema_version, run, scenario, runtime, input]
      properties:
        schema_version:
          type: string
          const: lab.adapter.v1
        run:
          type: object
          required: [id, mode, target]
          properties:
            id:
              type: string
              minLength: 1
            mode:
              type: string
              enum: [workflow, agent]
            target:
              type: string
              minLength: 1
          additionalProperties: true
        scenario:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              minLength: 1
            name:
              type: string
              minLength: 1
          additionalProperties: true
        runtime:
          type: object
          required: [env, session_state]
          properties:
            env:
              type: object
              additionalProperties:
                type: string
            session_state:
              type: object
          additionalProperties: true
        input:
          type: object
          properties:
            text:
              type: string
          additionalProperties: true
      additionalProperties: true
    AdapterOutput:
      type: object
      required: [schema_version, status, result]
      properties:
        schema_version:
          type: string
          const: lab.adapter.v1
        status:
          type: string
          enum: [COMPLETED, FAILED, TIMEOUT, CANCELLED]
        result:
          type: object
        metrics:
          type: object
          additionalProperties: true
        artifacts:
          type: array
          items:
            type: object
            required: [name, path]
            properties:
              name:
                type: string
                minLength: 1
              path:
                type: string
                minLength: 1
            additionalProperties: true
        error:
          oneOf:
            - type: 'null'
            - type: object
              required: [code, message]
              properties:
                code:
                  type: string
                  minLength: 1
                message:
                  type: string
                  minLength: 1
              additionalProperties: true
      allOf:
        - if:
            required: [status]
            properties:
              status:
                enum: [FAILED, TIMEOUT, CANCELLED]
          then:
            required: [error]
      additionalProperties: true
